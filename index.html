<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="一个用于记录重要回忆的横向滚动纪念网站模板">
  <title>时光旅程｜纪念网站模板</title>
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <!-- 开场封面 -->
  <section id="intro" class="intro" aria-labelledby="intro-title">
    <div class="intro__paper">
      <p class="intro__eyebrow">MEMORY JOURNEY</p>
      <h1 id="intro-title">有些故事，值得被好好收藏。</h1>
      <p class="intro__text">
        向下滚动，沿着时间的方向，重新经过那些重要的时刻。
      </p>
      <button id="startButton" class="primary-button" type="button">
        开始这段旅程
      </button>
      <p class="intro__tip">电脑端：滚轮 / 方向键　手机端：向上滑动</p>
    </div>
  </section>

  <!-- 固定在浏览器窗口内的旅程舞台 -->
  <main id="stage" class="stage" aria-label="时光旅程">
    <header class="topbar">
      <a class="brand" href="#" aria-label="返回旅程开头">
        <span class="brand__mark">✦</span>
        <span>时光旅程</span>
      </a>

      <nav id="chapterNav" class="chapter-nav" aria-label="章节导航"></nav>

      <div class="topbar__actions">
        <button id="audioButton" class="icon-button" type="button" aria-label="播放或暂停背景音乐">
          <span id="audioIcon" aria-hidden="true">♫</span>
          <span id="audioLabel">音乐</span>
        </button>
        <button id="restartButton" class="icon-button" type="button">
          ↺ 重看
        </button>
      </div>
    </header>

    <div class="progress" aria-hidden="true">
      <div id="progressBar" class="progress__bar"></div>
    </div>

    <div id="viewport" class="viewport">
      <div id="sceneTrack" class="scene-track"></div>

      <div id="traveler" class="traveler" aria-hidden="true">
        <img src="./assets/character/traveler.svg" alt="">
        <span class="traveler__shadow"></span>
      </div>

      <div class="scroll-hint" aria-hidden="true">
        <span>继续滚动</span>
        <span class="scroll-hint__arrow">→</span>
      </div>
    </div>
  </main>

  <!-- 桌面端用于产生纵向滚动距离 -->
  <div id="scrollSpace" class="scroll-space" aria-hidden="true"></div>

  <!-- 照片/故事弹窗 -->
  <dialog id="memoryModal" class="memory-modal">
    <button id="modalClose" class="memory-modal__close" type="button" aria-label="关闭弹窗">×</button>
    <div class="memory-modal__image-wrap">
      <img id="modalImage" src="" alt="">
    </div>
    <div class="memory-modal__content">
      <p id="modalDate" class="memory-modal__date"></p>
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>
    </div>
  </dialog>

  <!-- 不直接设置 src，避免未放音乐时产生报错 -->
  <audio id="backgroundMusic" loop preload="none"></audio>

  <noscript>
    <div class="noscript">请启用 JavaScript 后查看这个互动网站。</div>
  </noscript>

  <script src="./js/data.js"></script>
  <script src="./js/modal.js"></script>
  <script src="./js/audio.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
